# Auto-build native installers for Linux, Windows, and macOS on every release.
# Triggered by: pushing a git tag like v1.0.0, or manually via workflow_dispatch.
name: Release Builds

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          pip install -e ".[all]" pyinstaller
          pyinstaller build_binary.spec --clean --noconfirm
          cd dist
          tar -czf om-linux-x64.tar.gz om
          # .deb package
          DEB=agent-om_1.0.0_amd64
          mkdir -p $DEB/DEBIAN $DEB/usr/local/bin
          cp om $DEB/usr/local/bin/
          chmod 755 $DEB/usr/local/bin/om
          cat > $DEB/DEBIAN/control <<CTRL
          Package: agent-om
          Version: 1.0.0
          Architecture: amd64
          Maintainer: KdarshUchiha
          Description: Om — God-tier AI solution architect & builder CLI
          CTRL
          dpkg-deb --build $DEB
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/om-linux-x64.tar.gz
            dist/agent-om_1.0.0_amd64.deb

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          pip install -e ".[all]" pyinstaller
          pyinstaller build_binary.spec --clean --noconfirm
          Compress-Archive -Path dist\om.exe -DestinationPath dist\om-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/om.exe
            dist/om-windows-x64.zip

  build-macos:
    strategy:
      matrix:
        os: [macos-13, macos-14]   # macos-13 = Intel, macos-14 = Apple Silicon
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: |
          pip install -e ".[all]" pyinstaller
          pyinstaller build_binary.spec --clean --noconfirm
          mkdir -p build/dmg_src
          cp -R dist/Om.app build/dmg_src/
          ln -s /Applications build/dmg_src/Applications
          ARCH=$(uname -m)
          hdiutil create -volname "Om 1.0.0" \
            -srcfolder build/dmg_src \
            -ov -format UDZO \
            dist/Om-1.0.0-$ARCH.dmg
          cp dist/Om.app/Contents/MacOS/om dist/om-cli
          cd dist
          tar -czf om-macos-$ARCH.tar.gz om-cli
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.os }}
          path: |
            dist/Om-1.0.0-*.dmg
            dist/om-macos-*.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          name: "Om ${{ github.ref_name }}"
